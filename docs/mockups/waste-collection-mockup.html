const WT_COLOR = {
  burnable:   ['#fef2f2','#fecaca','#991b1b'],
  non_burnable:['#eff6ff','#bfdbfe','#1e40af'],
  recyclable: ['#f0fdf4','#bbf7d0','#166534'],
  pet_bottles:['#ecfeff','#a5f3fc','#155e75'],
  bottles:    ['#f0fdf4','#bbf7d0','#166534'],
  cans:       ['#f9fafb','#e5e7eb','#374151'],
  metals:     ['#f8fafc','#cbd5e1','#334155'],
  paper:      ['#fffbeb','#fde68a','#92400e'],
  cardboard:  ['#fff7ed','#fed7aa','#9a3412'],
  plastic:    ['#faf5ff','#e9d5ff','#6b21a8'],
  hazardous:  ['#fefce8','#fde047','#854d0e'],
  valuables:  ['#fefce8','#fde047','#854d0e'],
  clothing:   ['#fdf2f8','#fbcfe8','#9d174d'],
  branches:   ['#f7fee7','#d9f99d','#3f6212'],
  large_waste:['#fafaf9','#e7e5e4','#44403c'],
};
const DOW = {1:'月',2:'火',3:'水',4:'木',5:'金',6:'土',7:'日'};

function fmtDate(iso){ const [y,m,d]=iso.split('-'); return `${parseInt(m)}/${parseInt(d)}`; }

function fmtSchedule(s){
  const dow = (s.day_of_week||[]).join('・');
  switch(s.frequency){
    case 'weekly':   return `毎週 ${dow}`;
    case 'biweekly': return `隔週 ${dow}`;
    case 'monthly':
      if (s.day_of_month && s.day_of_month.length)
        return `毎月 ${s.day_of_month.map(d=>d+'日').join('・')}`;
      if (s.collection_dates && s.collection_dates.length)
        return `指定日 ${s.collection_dates.slice(0,4).map(fmtDate).join('・')}${s.collection_dates.length>4?'…':''}`;
      if (s.week_of_month && s.week_of_month.length)
        return `毎月 ${s.week_of_month.map(w=>'第'+w).join('・')} ${dow}`;
      return `毎月 ${dow}`;
    case 'scheduled':
      return `指定日 ${(s.collection_dates||[]).map(fmtDate).join('・')}`;
    case 'on_demand': return '申込制';
    default: return dow || '—';
  }
}

function renderCity(cid){
  const c = DATA.cities[cid];
  if (!c){ return `<div class="card none">この郵便番号のデータは未対応です（デモは5市のみ収録）。</div>`; }

  const cards = c.areas.map(a=>{
    const search = (a.area_name + ' ' + a.address_detail).replace(/[・,、]/g,' ');
    const chips = a.schedules.map(s=>{
      const col = WT_COLOR[s.waste_type] || ['#f3f4f6','#e5e7eb','#374151'];
      const time = s.collection_time==='nighttime' ? ' (夜)' : '';
      return `<div class="chip" style="background:${col[0]};border-color:${col[1]};color:${col[2]}">
                <b>${s.waste_type_ja||s.waste_type}</b><span>${fmtSchedule(s)}${time}</span></div>`;
    }).join('');
    return `<div class="district" data-search="${search}">
              <h3>${a.area_name||'(地区名なし)'}</h3>
              ${a.address_detail ? `<p class="towns">${a.address_detail}</p>` : ''}
              <div class="scheds">${chips}</div>
            </div>`;
  }).join('');

  const partial = c.shown_areas < c.total_real_areas
    ? `<div class="nomatch-note">※デモのため ${c.total_real_areas}地区中 ${c.shown_areas}地区のみ表示</div>` : '';

  return `
    <div class="card">
      <div class="city-banner">
        <h2>${c.city_name}</h2>
        <span class="count">全${c.total_real_areas}地区</span>
      </div>
      <div class="legend">郵便番号では市までしか特定できないため、<b>全地区を表示</b>しています。下の欄に<b>町名</b>を入れて絞り込めます（地区名・収録町名の両方を検索）。</div>
      <div class="filter-row" style="margin:12px 0">
        <input id="filter" type="text" placeholder="町名で絞り込む 例: 万町 / 旭町 / 真亀">
      </div>
      ${partial}
      <div id="list">${cards}</div>
      <div class="src">出典: <a href="${c.source_url}" target="_blank">${c.source_url}</a></div>
    </div>`;
}

function lookup(zipRaw){
  const zip = zipRaw.replace(/[^0-9]/g,'');
  const formatted = zip.length>=4 ? zip.slice(0,3)+'-'+zip.slice(3,7) : zip;
  const cid = DATA.zipmap[formatted];
  const result = document.getElementById('result');
  if (!cid){
    result.innerHTML = `<div class="card none">「${formatted}」は未収録です。デモボタンをお試しください。</div>`;
    return;
  }
  result.innerHTML = renderCity(cid);
  const filter = document.getElementById('filter');
  if (filter){
    filter.addEventListener('input', e=>{
      const q = e.target.value.trim();
      let visible = 0;
      document.querySelectorAll('.district').forEach(card=>{
        const hit = !q || card.dataset.search.includes(q);
        card.style.display = hit ? '' : 'none';
        if (hit) visible++;
      });
      const list = document.getElementById('list');
      let nm = document.getElementById('nm');
      if (visible===0 && !nm){
        nm = document.createElement('div'); nm.id='nm'; nm.className='none';
        nm.textContent='該当する地区がありません。町名の一部だけ入れてみてください。';
        list.appendChild(nm);
      } else if (visible>0 && nm){ nm.remove(); }
    });
  }
}

document.querySelectorAll('.demo-zips button').forEach(b=>{
  b.addEventListener('click', ()=>{ document.getElementById('zip').value=b.dataset.zip; lookup(b.dataset.zip); });
});
document.getElementById('zip').addEventListener('input', e=> lookup(e.target.value));
</script>
